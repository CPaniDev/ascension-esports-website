        .error-code { font-family: 'Bebas Neue', sans-serif; font-size: clamp(6rem, 20vw, 12rem); color: var(--accent); line-height: 1; }
        .error-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(1.5rem, 5vw, 2.5rem); letter-spacing: 4px; margin: 1rem 0; }

<body>
    <nav class="navbar">
