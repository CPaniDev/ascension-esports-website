<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; frame-ancestors 'none';">
    <title>Admin Login - Ascension Esports</title>
    <link rel="icon" type="image/png" href="../assets/images/logo.png" sizes="32x32">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/player.css">
</head>
<body>
    <nav class="navbar">
        <a href="../index.html" class="logo">
            <img src="../assets/images/logo.png" alt="Ascension Esports" class="logo-img">
            <span class="logo-text">ASCENSION</span>
            <span class="logo-accent">ESPORTS</span>
        </a>
        <button class="nav-toggle" aria-label="Toggle navigation menu">☰</button>
    </nav>

    <section class="player-hero">
        <div class="player-container" style="max-width: 550px;">
            <div class="player-header">
                <h1 class="player-gamertag">Admin Login</h1>
                <p class="player-realname">Secure area for match input</p>
            </div>
            <div class="add-match-section" style="margin-top: 0;">
                <form id="admin-login-form" class="match-form">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Login</button>
                </form>
                <div id="login-feedback" class="match-feedback"></div>
            </div>
        </div>
    </section>

    <script src="../scripts/config.js"></script>
    <script src="../scripts/security-utils.js"></script>
    <script src="../scripts/admin.js"></script>
</body>
</html>
